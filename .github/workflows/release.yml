name: Release Latest Binaries

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Build Cross-Compiled Binaries
        run: make build-release

      - name: Update Latest Tag
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git tag -f latest
          git push -f origin latest

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Rolling Release"
          body: "Auto-generated rolling release for the newest commits on main. Used by install scripts."
          files: releases/*
          prerelease: false
